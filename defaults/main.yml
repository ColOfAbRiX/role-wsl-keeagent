---

wsl_keeagent_ssh_agent_socket: "/var/run/wsl-ssh-agent.sock"
wsl_keeagent_host_address_file: "/run/host-address.fifo"

# WSL1 Variables

wsl_keeagent_service: wsl-keeagent
wsl_keeagent_msysgit_socket: ""
wsl_keeagent_script_path: /usr/local/bin
wsl_keeagent_script_name: msysgit2unix-socket.py

# WSL2 Variables

wsl_keeagent_win_pipe: //./pipe/openssh-ssh-agent
wsl_keeagent_agent_version: "1.6.9"
wsl_keeagent_exec_path: /usr/local/bin
wsl_keeagent_exec_name: npiperelay.exe
