---
# defaults file for wsl-keeagent

# Enable or disable the KeeAgent integration
wsl_keeagent_enabled: false

# Version of wsl-ssh-agent to install
# Leave empty to use the latest version from GitHub
wsl_keeagent_version: ""

# Path where the wsl-ssh-agent binary will be installed
wsl_keeagent_bin_path: /usr/local/bin/wsl-ssh-agent

# Socket path for SSH_AUTH_SOCK
wsl_keeagent_socket: /tmp/wsl-ssh-agent.sock

# wsl-ssh-agent GitHub repository
wsl_keeagent_github_repo: rupor-github/wsl-ssh-agent
