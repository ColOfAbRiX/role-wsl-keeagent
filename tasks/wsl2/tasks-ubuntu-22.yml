---

# See: https://github.com/rupor-github/wsl-ssh-agent?tab=readme-ov-file

- name: "Install required system packages"
  become: true
  ansible.builtin.apt:
    name: "{{ wsl_keeagent_packages }}"
    state: present
  tags: wsl-keeagent

- name: "Create temporary directory for bridge download"
  ansible.builtin.tempfile:
    state: directory
    suffix: wsl_keeagent
  register: wsl_keeagent_tmp
  tags: wsl-keeagent

- name: "Download wsl-ssh-agent release"
  ansible.builtin.get_url:
    url: "https://github.com/rupor-github/wsl-ssh-agent/releases/download/v{{ wsl_keeagent_agent_version }}/wsl-ssh-agent.zip"
    dest: "{{ wsl_keeagent_tmp.path }}/wsl-ssh-agent.zip"
    mode: '0644'
  tags: wsl-keeagent

- name: "Unarchive the agent binary"
  ansible.builtin.unarchive:
    src: "{{ wsl_keeagent_tmp.path }}/wsl-ssh-agent.zip"
    dest: "{{ wsl_keeagent_tmp.path }}"
    remote_src: yes
  tags: wsl-keeagent

- name: "Install bridge binary to system path"
  become: true
  ansible.builtin.copy:
    src: "{{ wsl_keeagent_tmp.path }}/{{ wsl_keeagent_exec_name }}"
    dest: "{{ wsl_keeagent_exec_path }}/{{ wsl_keeagent_exec_name }}"
    mode: '0755'
    remote_src: yes
  tags: wsl-keeagent

- name: "Remove temporary download files"
  ansible.builtin.file:
    path: "{{ wsl_keeagent_tmp.path }}"
    state: absent
  tags: wsl-keeagent

- name: "Deploy systemd system service unit"
  become: true
  ansible.builtin.template:
    src: "{{ templates_root }}/etc/systemd/wsl-keeagent.service.j2"
    dest: "/etc/systemd/system/wsl-keeagent.service"
    mode: '0644'
  register: wsl_keeagent_unit
  tags: wsl-keeagent

- name: "Reload systemd daemon"
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: wsl_keeagent_unit.changed
  tags: wsl-keeagent

- name: "Deploy system-wide environment variable script"
  become: true
  ansible.builtin.template:
    src: "{{ templates_root }}/etc/profile.d/wsl-keeagent.sh.j2"
    dest: "/etc/profile.d/wsl-keeagent.sh"
    mode: '0644'
  tags: wsl-keeagent

- name: "Enable and start the bridge service"
  become: true
  ansible.builtin.systemd:
    name: wsl-keeagent
    state: restarted
    enabled: yes
  tags: wsl-keeagent
